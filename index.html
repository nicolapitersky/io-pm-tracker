    <script>
        const STORE_KEY = 'io_pm_tracker_v1';

        const TEMPLATE = [
            {
                name: '1. Preparation & Governance', items: [
                    'Sponsor & SteerCo confirmed', 'Project Charter approved',
                    'Roles & Responsibilities (RACI) defined', 'Communication Plan (Cadence) set',
                    'Budget allocation & tracking established', 'Change Control process agreed'
                ]
            },
            {
                name: '2. Discovery & Requirements', items: [
                    'Stakeholder interviews completed', 'Business Requirement Document (BRD) frozen',
                    'Success Metrics (KPIs) defined', 'High-level Roadmap approved',
                    'Constraint & Dependency Log active', 'Process Mapping (As-Is / To-Be) complete'
                ]
            },
            {
                name: '3. Technical & Architecture', items: [
                    'Architecture Decision Records (ADRs) started', 'System Design Document (SDD) drafted',
                    'Security & Compliance (DPIA) review', 'Environment Strategy (Dev/Staging/Prod)',
                    'Integration Map & API Specs defined', 'Tooling/Stack selection finalized'
                ]
            },
            {
                name: '4. Implementation & Execution', items: [
                    'Backlog groomed & prioritized', 'Sprint 0 foundation complete',
                    'Core functionality development', 'Unit & Integration tests passing',
                    'Regular Stakeholder demos', 'Progress reporting updated weekly'
                ]
            },
            {
                name: '5. Quality & Launch Readiness', items: [
                    'UAT scripts & plan signed off', 'UAT execution & defect fixing',
                    'Operational Runbook drafted', 'Training materials & User Guides',
                    'Go-Live Checklist compiled', 'Post-Launch Support Plan active'
                ]
            }
        ];

        let state = loadState() || seedState();

        function seedState() {
            const s = {
                sections: TEMPLATE.map(sec => ({
                    name: sec.name,
                    items: sec.items.map(title => ({
                        title, owner: '', due: '', notes: '', done: false, completedAt: ''
                    }))
                }))
            };
            saveState(s); return s;
        }

        function loadState() {
            try { return JSON.parse(localStorage.getItem(STORE_KEY)); } catch (e) { return null; }
        }

        function saveState(s) {
            localStorage.setItem(STORE_KEY, JSON.stringify(s));
            updateOverallMaturity();
        }

        function resetData() {
            if (confirm('Permanently clear all saved progress?')) {
                localStorage.removeItem(STORE_KEY);
                location.reload();
            }
        }

        function loadSampleData() {
            const sample = {
                sections: TEMPLATE.map((sec, si) => ({
                    name: sec.name,
                    items: sec.items.map((title, ii) => {
                        const isDone = (si < 2 || (si === 2 && ii < 3));
                        return {
                            title,
                            owner: 'iO consulting',
                            due: new Date(Date.now() + (si * 7 * 24 * 60 * 60 * 1000)).toISOString().slice(0, 10),
                            notes: isDone ? 'Completed according to standard ISO 21500 guidelines.' : 'In progress. Target date is tracked.',
                            done: isDone,
                            completedAt: isDone ? new Date().toISOString().slice(0, 10) : ''
                        };
                    })
                }))
            };
            state = sample;
            saveState(state);
            render();
        }

        function updateOverallMaturity() {
            let total = 0, done = 0;
            state.sections.forEach(sec => {
                total += sec.items.length;
                done += sec.items.filter(it => it.done).length;
            });
            const pct = total ? Math.round(done * 100 / total) : 0;
            const el = document.getElementById('globalMaturityGrade');

            if (pct >= 95) { el.className = 'maturity-grade platinum'; el.innerText = 'Maturity: PLATINUM'; }
            else if (pct >= 80) { el.className = 'maturity-grade gold'; el.innerText = 'Maturity: GOLD'; }
            else if (pct >= 60) { el.className = 'maturity-grade silver'; el.innerText = 'Maturity: SILVER'; }
            else if (pct >= 30) { el.className = 'maturity-grade bronze'; el.innerText = 'Maturity: BRONZE'; }
            else { el.className = 'maturity-grade'; el.innerText = 'Maturity: SEEDLING'; }
        }

        let showOpenOnly = false;

        function toggleFilter() {
            showOpenOnly = !showOpenOnly;
            const btn = document.getElementById('toggleFilterBtn');
            if (showOpenOnly) {
                btn.classList.add('active');
                btn.innerText = 'Show open items only (ON)';
            } else {
                btn.classList.remove('active');
                btn.innerText = 'Show open items only';
            }
            render();
        }

        function render() {
            const container = document.getElementById('sections');
            container.innerHTML = '';
            let total = 0, done = 0;

            state.sections.forEach((sec, si) => {
                const secTotal = sec.items.length;
                const secDone = sec.items.filter(it => it.done).length;
                total += secTotal; done += secDone;
                const pct = secTotal ? Math.round(secDone * 100 / secTotal) : 0;

                const card = document.createElement('div'); card.className = 'section';

                const head = document.createElement('div'); head.className = 'section-head';
                head.innerHTML = `
                    <h2>${sec.name}</h2>
                    <div class="progress-mini">
                        <div class="bar-bg"><div class="bar-fill" style="width: ${pct}%"></div></div>
                        <span style="font-size: 13px; font-weight: 600; color: var(--muted);"> ${pct}%</span>
                    </div>
                `;
                card.appendChild(head);

                const tableWrap = document.createElement('div');
                tableWrap.style.overflowX = 'auto';

                const tbl = document.createElement('table');
                tbl.innerHTML = `
                    <thead>
                        <tr>
                            <th style="width: 50px;">Done</th>
                            <th>Deliverable</th>
                            <th style="width: 150px;">Owner</th>
                            <th style="width: 150px;">Due</th>
                            <th>Notes / Links</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                `;
                const tbody = tbl.querySelector('tbody');

                sec.items.forEach((it, ii) => {
                    const tr = document.createElement('tr');

                    if (!it.done && it.due) {
                        const today = new Date();
                        today.setHours(0, 0, 0, 0);
                        const dueDate = new Date(it.due);
                        const days = (dueDate - today) / (1000 * 60 * 60 * 24);
                        if (days < 0) { tr.className = 'overdue'; }
                        else if (days <= 2) { tr.className = 'at-risk'; }
                    }

                    const tdDone = document.createElement('td'); tdDone.setAttribute('data-label', 'Done');
                    const cb = document.createElement('input');
                    cb.type = 'checkbox'; cb.className = 'checkbox-custom'; cb.checked = !!it.done;
                    cb.onchange = () => {
                        it.done = cb.checked;
                        it.completedAt = it.done ? new Date().toISOString().slice(0, 10) : '';
                        saveState(state); render();
                    };
                    tdDone.appendChild(cb);

                    const tdTitle = document.createElement('td'); tdTitle.setAttribute('data-label', 'Deliverable');
                    const title = document.createElement('textarea');
                    title.style.minHeight = '40px'; title.value = it.title;
                    title.onchange = () => { it.title = title.value; saveState(state); };
                    tdTitle.appendChild(title);

                    const tdOwner = document.createElement('td'); tdOwner.setAttribute('data-label', 'Owner');
                    const owner = document.createElement('input');
                    owner.type = 'text'; owner.placeholder = 'Assignee'; owner.value = it.owner || '';
                    owner.onchange = () => { it.owner = owner.value; saveState(state); };
                    tdOwner.appendChild(owner);

                    const tdDue = document.createElement('td'); tdDue.setAttribute('data-label', 'Due');
                    const due = document.createElement('input');
                    due.type = 'date'; due.value = it.due || '';
                    due.onchange = () => { it.due = due.value; saveState(state); };
                    tdDue.appendChild(due);

                    const tdNotes = document.createElement('td'); tdNotes.setAttribute('data-label', 'Notes');
                    const notes = document.createElement('textarea');
                    notes.style.minHeight = '40px'; notes.placeholder = 'Evidence, links...'; notes.value = it.notes || '';
                    notes.onchange = () => { it.notes = notes.value; saveState(state); };
                    tdNotes.appendChild(notes);

                    tr.append(tdDone, tdTitle, tdOwner, tdDue, tdNotes);
                    tbody.appendChild(tr);
                });

                const adder = document.createElement('div'); adder.className = 'adder';
                adder.innerHTML = `
      <input type="text" placeholder="Add deliverable… (press Add)" />
      <button class="secondary">Add</button>
    `;
                const addInput = adder.querySelector('input');
                const addBtn = adder.querySelector('button');
                addBtn.onclick = () => {
                    const val = addInput.value.trim(); if (!val) return;
                    sec.items.push({ title: val, owner: '', due: '', notes: '', done: false, completedAt: '' });
                    addInput.value = ''; saveState(state); render();
                };

                tableWrap.appendChild(tbl);
                card.appendChild(tableWrap);
                card.appendChild(adder); // Add the adder back
                container.appendChild(card);
            });

            // Update KPIs
            const kpiContainer = document.getElementById('overallKpis');
            const overallPct = total ? Math.round(done * 100 / total) : 0;
            kpiContainer.innerHTML = `
                <div class="kpi-card">
                    <div class="kpi-label">Project Progress</div>
                    <div class="kpi-value">${overallPct}<i>%</i></div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label">Deliverables</div>
                    <div class="kpi-value">${done} <i>/ ${total}</i></div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label">Open Actions</div>
                    <div class="kpi-value">${total - done}</div>
                </div>
            `;
            updateOverallMaturity();
        }

        // CSV Helper
        function exportCSV() {
            const rows = [['Section', 'Deliverable', 'Owner', 'Due', 'Done', 'Notes']];
            state.sections.forEach(sec => {
                sec.items.forEach(it => {
                    rows.push([
                        sec.name, it.title, it.owner || '', it.due || '', it.done ? 'Yes' : 'No', it.notes || ''
                    ]);
                });
            });
            const csvContent = "data:text/csv;charset=utf-8," + rows.map(e => e.join(",")).join("\n");
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "project_maturity_tracker.csv");
            document.body.appendChild(link);
            link.click();
        }

        function importCSV(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (ex) {
                const text = ex.target.result;
                // Simple parser (could be improved for robust CSV handling)
                const lines = text.split('\n').slice(1);
                lines.forEach(line => {
                    const [secName, title, owner, due, done, notes] = line.split(',');
                    if (!secName) return;
                    const section = state.sections.find(s => s.name === secName);
                    if (section) {
                        const item = section.items.find(i => i.title === title);
                        if (item) {
                            item.owner = owner;
                            item.due = due;
                            item.done = (done === 'Yes');
                            item.notes = notes;
                        }
                    }
                });
                saveState(state);
                render();
            };
            reader.readAsText(file);
        }

        function parseCSV(text) {
            const rows = []; let cur = [], i = 0, s = text, len = s.length, inQ = false, val = '';
            while (i < len) {
                const c = s[i];
                if (inQ) {
                    if (c === '"') {
                        if (s[i + 1] === '"') { val += '"'; i++; }
                        else { inQ = false; }
                    } else val += c;
                } else {
                    if (c === ',') { cur.push(val); val = ''; }
                    else if (c === '"') { inQ = true; }
                    else if (c === '\n' || c === '\r') {
                        if (c === '\r' && s[i + 1] === '\n') i++;
                        cur.push(val); rows.push(cur); cur = []; val = '';
                    } else val += c;
                }
                i++;
            }
            if (val.length > 0 || cur.length) { cur.push(val); rows.push(cur); }
            return rows;
        }

        function download(filename, content, mime) {
            const blob = new Blob([content], { type: mime || 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
            setTimeout(() => URL.revokeObjectURL(url), 500);
        }

        function getMaturityText(pct) {
            if (pct >= 95) return 'PLATINUM';
            if (pct >= 80) return 'GOLD';
            if (pct >= 60) return 'SILVER';
            if (pct >= 30) return 'BRONZE';
            return 'SEEDLING';
        }

        function getOverallStats() {
            let total = 0, done = 0;
            state.sections.forEach(sec => {
                total += sec.items.length;
                done += sec.items.filter(it => it.done).length;
            });
            const open = total - done;
            const pct = total ? Math.round(done * 100 / total) : 0;
            return { total, done, open, pct, level: getMaturityText(pct) };
        }

        function copyExecutiveSummary() {
            const stats = getOverallStats();
            let summary = `iO Project Maturity Tracker | Status: ${stats.level} (${stats.pct}%) | ${stats.open} Open Deliverables\n\n`;

            let upcoming = [];
            state.sections.forEach(sec => {
                sec.items.forEach(it => {
                    if (!it.done && it.due) upcoming.push(it);
                });
            });
            upcoming.sort((a, b) => new Date(a.due) - new Date(b.due));

            if (upcoming.length > 0) {
                summary += `Next Due:\n`;
                upcoming.slice(0, 3).forEach(it => {
                    summary += `- ${it.title} (${it.due})\n`;
                });
            }

            navigator.clipboard.writeText(summary).then(() => alert('Executive Summary copied to clipboard!'));
        }

        function exportToAI() {
            const stats = getOverallStats();
            let md = `# Project State: ${stats.level} (${stats.pct}%)\nTotal: ${stats.total}, Done: ${stats.done}, Open: ${stats.open}\n\n`;

            state.sections.forEach(sec => {
                md += `## ${sec.name}\n`;
                sec.items.forEach(it => {
                    md += `- [${it.done ? 'x' : ' '}] ${it.title}\n`;
                    if (it.owner) md += `  - Owner: ${it.owner}\n`;
                    if (it.due) md += `  - Due: ${it.due}\n`;
                    if (it.notes) md += `  - Notes: ${it.notes}\n`;
                });
                md += '\n';
            });

            download('ai-context.md', md, 'text/markdown');
        }

        render();
    </script>
</body>
